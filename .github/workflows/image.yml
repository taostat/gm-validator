name: image

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build, push, and deploy gm-validator image
    runs-on: ubuntu-24.04
    # Mainnet hard-stop. A plain tag (vX.Y.Z) targets the `mainnet`
    # Environment; protect it with a required reviewer so the netuid-28
    # build + overlay bump waits for human approval. A -dev tag targets
    # `testnet` (unprotected) and flows through without a pause.
    environment: ${{ endsWith(github.ref_name, '-dev') && 'testnet' || 'mainnet' }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      # A -dev suffix (vX.Y.Z-dev) releases to testnet; a plain tag
      # (vX.Y.Z) releases to mainnet. Mirrors taostat/auth-gateway.
      - name: Determine overlay from tag
        id: env
        env:
          REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ "$REF" == *-dev ]]; then
            echo "overlay=testnet" >> "$GITHUB_OUTPUT"
          else
            echo "overlay=mainnet" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Log in to Quay
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: Dockerfile
          push: true
          tags: quay.io/taostats/gm-validator:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Fire a repository_dispatch at ci-cd-repo so it bumps the gm-validator
      # tag in the selected overlay and ArgoCD rolls the new image out.
      - name: Trigger deployment
        uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0  # v3.0.0
        with:
          token: ${{ secrets.GH_PAT }}
          repository: taostat/ci-cd-repo
          event-type: update-image
          client-payload: >-
            {
              "shared-secret": "${{ secrets.GH_PAT }}",
              "project-name": "gm-validator",
              "paths": "${{ steps.env.outputs.overlay }}",
              "images": [
                {
                  "name": "quay.io/taostats/gm-validator",
                  "newName": "quay.io/taostats/gm-validator",
                  "version": "${{ github.ref_name }}"
                }
              ]
            }
