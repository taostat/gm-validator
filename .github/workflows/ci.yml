name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (lint + build + test)
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable
          components: clippy, rustfmt
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tooling
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu

      - name: Rust cache
        uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab  # v2.7.5
        with:
          key: ${{ matrix.target }}

      - name: Format
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo fmt --all --check

      - name: Clippy
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --target ${{ matrix.target }} --all-targets

      - name: Test
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo test --all-features

  rust-supply-chain:
    name: Rust supply chain (cargo deny)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: cargo deny
        uses: EmbarkStudios/cargo-deny-action@0105f7c440bc8084c17cad47fe92e63049519458  # v2.0.18
        with:
          command: check
          arguments: --all-features

  python:
    name: Python (ruff + ty)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "0.11.x"

      - name: Install Python
        run: uv python install 3.13

      - name: Sync validator project
        working-directory: validator
        run: uv sync --all-extras --dev

      - name: ruff check
        working-directory: validator
        run: uv tool run --from "ruff==0.15.12" ruff check .

      - name: ruff format check
        working-directory: validator
        run: uv tool run --from "ruff==0.15.12" ruff format --check .

      - name: ty
        working-directory: validator
        run: uv tool run --from "ty==0.0.37" ty check src

      - name: pip-audit
        working-directory: validator
        run: uv tool run --from "pip-audit==2.10.0" pip-audit

  shell:
    name: Shell (shellcheck + shfmt)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: shellcheck
        run: |
          set -euo pipefail
          if find . -path ./target -prune -o -type f -name '*.sh' -print | head -1 | read -r _; then
            find . -path ./target -prune -o -type f -name '*.sh' -print0 | xargs -0 shellcheck
          fi

      - name: Install shfmt
        run: |
          set -euo pipefail
          curl -fsSL https://github.com/mvdan/sh/releases/download/v3.10.0/shfmt_v3.10.0_linux_amd64 -o /usr/local/bin/shfmt
          chmod +x /usr/local/bin/shfmt

      - name: shfmt
        run: |
          set -euo pipefail
          if find . -path ./target -prune -o -type f -name '*.sh' -print | head -1 | read -r _; then
            find . -path ./target -prune -o -type f -name '*.sh' -print0 | xargs -0 shfmt -d -i 2 -ci
          fi

  actions-lint:
    name: GitHub Actions (actionlint + zizmor)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: actionlint
        run: |
          set -euo pipefail
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.4/scripts/download-actionlint.bash) 1.7.4
          ./actionlint -color

      - name: zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d  # v0.5.6
        with:
          advanced-security: "false"
          config: .github/zizmor.yml
