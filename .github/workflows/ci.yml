name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (ruff + ty)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "0.11.x"

      - name: Install Python
        run: uv python install 3.13

      - name: Sync validator project
        working-directory: validator
        run: uv sync --all-extras --dev

      - name: ruff check
        working-directory: validator
        run: uv tool run --from "ruff==0.15.12" ruff check .

      - name: ruff format check
        working-directory: validator
        run: uv tool run --from "ruff==0.15.12" ruff format --check .

      - name: ty
        working-directory: validator
        run: uv tool run --from "ty==0.0.37" ty check src

      - name: pytest
        working-directory: validator
        run: uv run pytest

      - name: pip-audit
        working-directory: validator
        # PYSEC-2022-42969: ReDoS in py.path.svnwc, an unmaintained
        # transitive dep of bittensor (via retry). The vulnerable
        # Subversion code path is never reached; no fixed release exists.
        run: >-
          uv tool run --from "pip-audit==2.10.0" pip-audit
          --ignore-vuln PYSEC-2022-42969

  shell:
    name: Shell (shellcheck + shfmt)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: shellcheck
        run: |
          set -euo pipefail
          if find . -type f -name '*.sh' -print | head -1 | read -r _; then
            find . -type f -name '*.sh' -print0 | xargs -0 shellcheck
          fi

      - name: Install shfmt
        run: |
          set -euo pipefail
          curl -fsSL https://github.com/mvdan/sh/releases/download/v3.10.0/shfmt_v3.10.0_linux_amd64 -o /usr/local/bin/shfmt
          chmod +x /usr/local/bin/shfmt

      - name: shfmt
        run: |
          set -euo pipefail
          if find . -type f -name '*.sh' -print | head -1 | read -r _; then
            find . -type f -name '*.sh' -print0 | xargs -0 shfmt -d -i 2 -ci
          fi

  actions-lint:
    name: GitHub Actions (actionlint + zizmor)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: actionlint
        run: |
          set -euo pipefail
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.4/scripts/download-actionlint.bash) 1.7.4
          ./actionlint -color

      - name: zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa  # v0.5.7
        with:
          advanced-security: "false"
